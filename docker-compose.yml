# Three-step pipeline:
#   1. `docker compose run --rm ingest` populates data/deals.sqlite
#   2. `docker compose up mcp`           serves the MCP over Streamable HTTP
#   3. `docker compose up web`           runs the chat demo on http://localhost:3000
#
# The MCP server stays the primary deliverable; the web service is a
# demo client that consumes it over HTTP.

services:
  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    image: groupon-ingest:local
    env_file: .env
    volumes:
      - ./data:/data
      - ./ingestion/data:/app/ingestion/data:ro
    command: >
      ingest
      --max 12
      --kinds all
      --slugs all
      --json /data/scraped.json
      --sqlite /data/deals.sqlite
      --provider openai

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: groupon-mcp:local
    env_file: .env
    environment:
      MCP_TRANSPORT: http
      SQLITE_PATH: /data/deals.sqlite
    ports:
      - "3333:3333"
    volumes:
      - ./data:/data:ro
    depends_on:
      ingest:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: groupon-web:local
    env_file: .env
    environment:
      MCP_URL: http://mcp:3333/mcp
      WEB_PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      mcp:
        condition: service_started
